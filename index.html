<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkPS - جميع نماذج الذكاء الاصطناعي</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131f;
            --border: #1e1e30;
            --primary: #6c5ce7;
            --text: #e2e2e2;
            --text-secondary: #8888aa;
            --danger: #ff4757;
            --success: #00e676;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(ellipse at top, rgba(108,92,231,0.15), transparent 50%);
        }

        .header {
            background: rgba(19,19,31,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            max-width: 1500px;
            margin: 0 auto;
            height: calc(100vh - 85px);
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow-y: auto;
        }

        .sidebar-title {
            padding: 1rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
            position: sticky;
            top: 0;
            background: var(--card);
            z-index: 1;
        }

        .model-list { list-style: none; }

        .model-item {
            padding: 0.9rem 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.85rem;
        }

        .model-item:hover { background: rgba(108,92,231,0.1); }
        .model-item.active { background: rgba(108,92,231,0.2); border-right: 3px solid var(--primary); }

        .model-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 80%;
            padding: 1rem;
            border-radius: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.05);
            flex-shrink: 0;
        }

        .user .message-avatar { background: var(--primary); }

        .typing {
            display: none;
            color: var(--text-secondary);
            padding: 0.5rem 1.5rem;
        }
        .typing.show { display: block; }

        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.8rem;
        }

        .input-area textarea {
            flex: 1;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            min-height: 45px;
            max-height: 150px;
        }

        .input-area textarea:focus { outline: none; border-color: var(--primary); }

        .btn-send {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .menu-toggle {
            display: none;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 0.5rem; height: calc(100vh - 80px); }
            .sidebar { position: fixed; right: -100%; top: 0; height: 100vh; z-index: 200; transition: 0.3s; }
            .sidebar.open { right: 0; border-radius: 0; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <div class="logo">⚡ DarkPS AI</div>
        <div style="font-size:0.8rem;color:var(--text-secondary)">@WaTaN & @sii_3</div>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">📋 جميع النماذج</div>
            <ul class="model-list" id="modelList"></ul>
        </div>

        <div class="main-chat">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <strong>👋 أهلاً بك في منصة DarkPS</strong><br><br>
                        📌 اختر نموذجاً من القائمة<br>
                        🔥 جميع النماذج بنفس طريقة الاتصال الأصلية
                    </div>
                </div>
            </div>
            <div class="typing" id="typing">⏳ جاري المعالجة...</div>
            <div class="input-area">
                <textarea id="userInput" placeholder="اكتب رسالتك... (Enter للإرسال)" rows="1"></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()">🚀 إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // ============ تعريف جميع النماذج بنفس طريقة الأكواد الأصلية ============
        const models = [
            {
                id: 'flexgpt',
                name: 'FlexGPT',
                provider: 'Asiacell العراق',
                icon: '🇮🇶',
                color: '#e91e63',
                desc: 'نموذج اسياسيل - لهجة عراقية',
                // نفس كود WaTaN الأصلي
                handler: async (msg) => {
                    const res = await fetch('https://api.flexgpt.live/api/chat/526', {
                        method: 'POST',
                        headers: {
                            'authority': 'api.flexgpt.live',
                            'accept': 'application/json, text/plain, */*',
                            'accept-language': 'ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7',
                            'authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic',
                            'content-type': 'application/json',
                            'origin': 'https://demo.flexgpt.live',
                            'referer': 'https://demo.flexgpt.live/',
                            'sec-ch-ua': '"Chromium";v="139", "Not;A=Brand";v="99"',
                            'sec-ch-ua-mobile': '?1',
                            'sec-ch-ua-platform': '"Android"',
                            'sec-fetch-dest': 'empty',
                            'sec-fetch-mode': 'cors',
                            'sec-fetch-site': 'same-site',
                            'user-agent': 'Mozilla/5.0 (Linux; Android 10; K) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/139.0.0.0 Mobile Safari/537.36'
                        },
                        body: JSON.stringify({ message: msg, isWebSearch: false })
                    });
                    const data = await res.json();
                    return data.response || 'لا يوجد رد';
                }
            },
            {
                id: 'deepseek-chat',
                name: 'DeepSeek Chat',
                provider: 'chat-deep.ai',
                icon: '🐋',
                color: '#4b32c3',
                desc: 'DeepSeek V3 / V4 Pro / R1',
                // نفس كود Mr Dark الأصلي - chat-deep.ai
                handler: async (msg) => {
                    // استخراج nonce من الصفحة
                    const pageRes = await fetch('https://chat-deep.ai/deepseek-chat/', {
                        headers: { 'user-agent': 'Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36 Chrome/132 Mobile Safari/537.36' }
                    });
                    const pageText = await pageRes.text();
                    
                    // استخراج nonce
                    let nonce = null;
                    const patterns = [
                        /x-wp-nonce["']?\s*[:=]\s*["']([a-zA-Z0-9]+)["']/,
                        /wpApiSettings.*?nonce["']\s*:\s*["']([a-zA-Z0-9]+)["']/,
                        /nonce["']?\s*[:=]\s*["']([a-zA-Z0-9]+)["']/,
                        /data-nonce=["']([a-zA-Z0-9]+)["']/
                    ];
                    for (const p of patterns) {
                        const m = pageText.match(p);
                        if (m) { nonce = m[1]; break; }
                    }
                    
                    const res = await fetch('https://chat-deep.ai/wp-json/dsc/v1/chat', {
                        method: 'POST',
                        headers: {
                            'accept': 'text/event-stream',
                            'content-type': 'application/json',
                            'origin': 'https://chat-deep.ai',
                            'referer': 'https://chat-deep.ai/deepseek-chat/',
                            'user-agent': 'Mozilla/5.0 (Linux; Android 10) AppleWebKit/537.36 Chrome/132 Mobile Safari/537.36',
                            'x-wp-nonce': nonce || ''
                        },
                        body: JSON.stringify({
                            messages: [
                                { role: 'system', content: 'أنت مساعد مفيد.' },
                                { role: 'user', content: msg },
                                { role: 'assistant', content: '' }
                            ],
                            model: 'deepseek-v3',
                            thinking: false
                        })
                    });
                    
                    const text = await res.text();
                    const lines = text.split('\n');
                    let full = '';
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const json = JSON.parse(line.slice(6));
                                full += json.choices?.[0]?.delta?.content || '';
                            } catch {}
                        }
                    }
                    return full || 'لا يوجد رد';
                }
            },
            {
                id: 'deepseek-r1',
                name: 'DeepSeek R1',
                provider: 'DeepSeek AI',
                icon: '🧠',
                color: '#00b894',
                desc: 'نموذج التفكير العميق',
                // نفس كود rewind.ai الأصلي
                handler: async (msg) => {
                    // تسجيل حساب عشوائي
                    const email = Math.random().toString(36).substring(7) + '@gmail.com';
                    const pass = Math.random().toString(36).substring(4) + 'A1' + Math.random().toString(36).substring(4) + 'a';
                    
                    const signupRes = await fetch('https://api.rewind.ai/v1/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pass })
                    });
                    const signupData = await signupRes.json();
                    const token = signupData.accessToken;
                    const userId = signupData.user.id;
                    
                    const res = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                            'x-user-id': userId,
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            messages: [{ role: 'user', content: msg }],
                            model: 'deepseek/deepseek-r1',
                            stream: false
                        })
                    });
                    const data = await res.json();
                    return data.choices?.[0]?.message?.content || 'لا يوجد رد';
                }
            },
            {
                id: 'gemini-google',
                name: 'Google Gemini',
                provider: 'Google',
                icon: '🔵',
                color: '#4285f4',
                desc: 'Gemini 3.5 Flash / Deep Research',
                // نفس كود Gemini الأصلي
                handler: async (msg) => {
                    try {
                        // الطريقة المباشرة من الكود الأصلي
                        const res = await fetch('https://gemini.google.com/_/BardChatUi/data/assistant.lamda.BardFrontendService/StreamGenerate', {
                            method: 'POST',
                            headers: {
                                'content-type': 'application/x-www-form-urlencoded;charset=UTF-8',
                                'x-goog-ext-525001261-jspb': '[1,null,null,null,"35609594dbe934d8"]',
                                'user-agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/123.0 Safari/537.36'
                            },
                            body: new URLSearchParams({
                                'f.req': JSON.stringify([null, JSON.stringify([[msg, 0, null, [], null, null, 0], ["ar"], [null, null, null, null, null, []], null, null, null, [], 0, [], [], 1, 0]])]),
                                'at': 'ABPfkH3gS_7gR8x9Z2qL1mN',
                                'bl': 'boq_assistant-bard-web-server_20240519.16_p0'
                            })
                        });
                        
                        const text = await res.text();
                        try {
                            const lines = text.split('\n');
                            for (const line of lines) {
                                try {
                                    const parsed = JSON.parse(line);
                                    if (Array.isArray(parsed) && parsed[0] && parsed[0][2]) {
                                        const inner = JSON.parse(parsed[0][2]);
                                        return inner[4]?.[0]?.[1]?.[0] || 'لا يوجد رد';
                                    }
                                } catch {}
                            }
                        } catch {}
                        return 'فشل في معالجة الرد';
                    } catch {
                        // fallback عبر rewind.ai
                        const res = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                messages: [{ role: 'user', content: msg }],
                                model: 'google/gemini-2.5-flash',
                                stream: false
                            })
                        });
                        const data = await res.json();
                        return data.choices?.[0]?.message?.content || 'لا يوجد رد';
                    }
                }
            },
            {
                id: 'kilwa-grok',
                name: 'KILWA GROK',
                provider: 'KILWA',
                icon: '🌌',
                color: '#ff6b6b',
                desc: 'Grok 4.3 - نموذج متقدم',
                // نفس كود KILWA الأصلي
                handler: async (msg) => {
                    const res = await fetch(`http://de3.bot-hosting.net:21007/kilwa-grok?text=${encodeURIComponent(msg)}`);
                    const data = await res.json();
                    return data.reply || 'لا يوجد رد';
                }
            },
            {
                id: 'livechatai',
                name: 'LiveChatAI',
                provider: 'LiveChat',
                icon: '💬',
                color: '#00b894',
                desc: 'مساعد ذكي للمحادثات',
                // نفس كود curl الأصلي
                handler: async (msg) => {
                    // إنشاء محادثة
                    const initRes = await fetch('https://app.livechatai.com/api/v1/aibot/reply', {
                        method: 'POST',
                        headers: { 'content-type': 'application/json' },
                        body: JSON.stringify({
                            chatbotId: 'clm2020z80001mh0f58no73h8',
                            question: msg,
                            messageType: 'TEXT',
                            isFollowUp: false,
                            streaming: true,
                            country: 'PS',
                            location: 'https://livechatai.com/',
                            chatType: 'MESSENGER'
                        })
                    });
                    const initText = await initRes.text();
                    const chatIdMatch = initText.match(/"chatId":"([^"]+)"/);
                    if (!chatIdMatch) return 'فشل في إنشاء المحادثة';
                    const chatId = chatIdMatch[1];
                    
                    // متابعة
                    const followRes = await fetch('https://app.livechatai.com/api/v1/aibot/reply', {
                        method: 'POST',
                        headers: { 'content-type': 'application/json' },
                        body: JSON.stringify({
                            chatbotId: 'clm2020z80001mh0f58no73h8',
                            chatId: chatId,
                            question: 'اكمل',
                            messageType: 'TEXT',
                            isFollowUp: true,
                            streaming: true,
                            country: 'PS',
                            location: 'https://livechatai.com/',
                            chatType: 'MESSENGER'
                        })
                    });
                    
                    const followText = await followRes.text();
                    const lines = followText.split('\n');
                    let full = '';
                    for (const line of lines) {
                        if (line.includes('"type":"chunk"')) {
                            const m = line.match(/"token":"([^"]*)"/);
                            if (m) full += m[1];
                        }
                    }
                    return full || 'لا يوجد رد';
                }
            },
            {
                id: 'chatbox-gemini',
                name: 'Gemini ChatBox',
                provider: 'Google',
                icon: '💎',
                color: '#0984e3',
                desc: 'Gemini 2.5 Flash عبر ChatBox',
                // نفس كود ChatBox الأصلي
                handler: async (msg) => {
                    const securedKey = Array(88).fill(0).map(() => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/='[(Math.random() * 65) | 0]).join('');
                    const deviceId = Array(16).fill(0).map(() => '0123456789abcdef'[(Math.random() * 16) | 0]).join('');
                    
                    // تسجيل
                    const regRes = await fetch('https://api.chatboxapp.ai/auth/v2/users?deviceId=' + deviceId + '&appName=ChatBox', {
                        method: 'POST',
                        headers: {
                            'user-agent': 'ChatBox_Android/1.82.3',
                            'x-secured-key': securedKey,
                            'content-type': 'application/json; charset=utf-8'
                        },
                        body: JSON.stringify({ strategy: 'androidV1' })
                    });
                    
                    if (!regRes.ok) return 'فشل التسجيل في ChatBox';
                    const regData = await regRes.json();
                    const token = regData.accessToken;
                    
                    // إرسال
                    const res = await fetch('https://api.florate.io/v2/chats/stream', {
                        method: 'POST',
                        headers: {
                            'authorization': `Bearer ${token}`,
                            'user-agent': 'ChatBox_Android/1.82.3',
                            'accept': 'text/event-stream',
                            'content-type': 'application/json',
                            'x-device-id': crypto.randomUUID() + 'R',
                            'x-persistent-id': deviceId
                        },
                        body: JSON.stringify({
                            model: 'gemini-2.5-flash',
                            messages: [
                                { content: [{ type: 'text', text: 'You are a helpful assistant.' }], role: 'system' },
                                { content: [{ type: 'text', text: msg }], role: 'user' }
                            ],
                            func_scopes: [{ scope: 'web_search_v2', config: { model: 'sonar' } }]
                        })
                    });
                    
                    const text = await res.text();
                    const lines = text.split('\n');
                    let full = '';
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const json = JSON.parse(line.slice(6));
                                full += json.choices?.[0]?.delta?.content || '';
                            } catch {}
                        }
                    }
                    return full || 'لا يوجد رد';
                }
            },
            {
                id: 'rewind-gpt',
                name: 'GPT-5',
                provider: 'OpenAI',
                icon: '⚡',
                color: '#00a67d',
                desc: 'GPT-5 عبر Rewind.ai',
                handler: async (msg) => {
                    const email = Math.random().toString(36).substring(7) + '@gmail.com';
                    const pass = Math.random().toString(36).substring(4) + 'A1a';
                    const signupRes = await fetch('https://api.rewind.ai/v1/auth/signup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pass })
                    });
                    const signupData = await signupRes.json();
                    const token = signupData.accessToken;
                    const userId = signupData.user.id;
                    
                    const res = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`,
                            'x-user-id': userId,
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({
                            messages: [{ role: 'user', content: msg }],
                            model: 'openai/gpt-5',
                            stream: false
                        })
                    });
                    const data = await res.json();
                    return data.choices?.[0]?.message?.content || 'لا يوجد رد';
                }
            }
        ];

        let currentModel = null;

        // ============ تهيئة القائمة ============
        function initModels() {
            const list = document.getElementById('modelList');
            models.forEach(m => {
                const li = document.createElement('li');
                li.className = 'model-item';
                li.onclick = () => selectModel(m, li);
                li.innerHTML = `
                    <div class="model-icon" style="background:${m.color}20;color:${m.color}">${m.icon}</div>
                    <div style="flex:1">
                        <div style="font-weight:600">${m.name}</div>
                        <div style="font-size:0.7rem;color:var(--text-secondary)">${m.provider}</div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function selectModel(model, el) {
            document.querySelectorAll('.model-item').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            currentModel = model;
            addMsg('assistant', `✅ <strong>${model.name}</strong>\n📝 ${model.desc}\n\n💡 جاهز للاستفسارات`);
            document.getElementById('sidebar').classList.remove('open');
        }

        function addMsg(role, content) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${content}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.querySelector('.message-content');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('btnSend');
            const msg = input.value.trim();
            
            if (!msg) return;
            if (!currentModel) {
                alert('⚠️ اختر نموذجاً من القائمة أولاً');
                return;
            }

            input.value = '';
            input.disabled = true;
            btn.disabled = true;
            addMsg('user', msg);
            document.getElementById('typing').classList.add('show');

            try {
                const reply = await currentModel.handler(msg);
                addMsg('assistant', reply);
            } catch (e) {
                console.error(e);
                addMsg('assistant', `❌ خطأ: ${e.message}`);
            } finally {
                document.getElementById('typing').classList.remove('show');
                input.disabled = false;
                btn.disabled = false;
                input.focus();
            }
        }

        // ============ بدء التشغيل ============
        initModels();

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // اختيار أول نموذج
        setTimeout(() => {
            const first = document.querySelector('.model-item');
            if (first) first.click();
        }, 500);

        console.log('✅ DarkPS جاهز - جميع النماذج بنفس طريقة الأكواد الأصلية');
    </script>
</body>
</html>
