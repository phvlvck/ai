<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة DarkPS - جميع نماذج الذكاء الاصطناعي</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131f;
            --border: #1e1e30;
            --primary: #6c5ce7;
            --text: #e2e2e2;
            --text-secondary: #8888aa;
            --success: #00e676;
            --danger: #ff4757;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, rgba(108,92,231,0.15), transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0,206,209,0.1), transparent 50%);
        }

        /* Header */
        .header {
            background: rgba(19,19,31,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span { font-size: 0.8rem; opacity: 0.7; }

        /* Layout */
        .container {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 120px);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            padding: 1.2rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
        }

        .model-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }

        .model-item {
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
        }

        .model-item:hover { background: rgba(108,92,231,0.1); }
        .model-item.active { 
            background: rgba(108,92,231,0.2);
            border-right: 3px solid var(--primary);
        }

        .model-icon {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .provider-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            margin-right: auto;
        }

        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 80%;
            padding: 1rem;
            border-radius: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .typing-indicator {
            display: none;
            color: var(--text-secondary);
            font-style: italic;
            padding: 0.5rem 1rem;
        }

        .typing-indicator.active { display: block; }

        /* Input */
        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            min-height: 45px;
            max-height: 150px;
            line-height: 1.5;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Mobile */
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text);
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 0.5rem; height: calc(100vh - 80px); }
            .sidebar { 
                position: fixed; 
                left: -100%; 
                top: 0; 
                height: 100vh; 
                z-index: 200;
                transition: left 0.3s;
                width: 280px;
            }
            .sidebar.open { left: 0; }
            .menu-toggle { display: block; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .error-message {
            background: rgba(255,71,87,0.1);
            border: 1px solid var(--danger);
            padding: 1rem;
            border-radius: 12px;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
        <div class="logo">⚡ DarkPS <span>| جميع النماذج</span></div>
        <div style="font-size:0.8rem; color: var(--text-secondary);">@2026 - Mr Dark</div>
    </div>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-title">📋 النماذج المتاحة</div>
            <ul class="model-list" id="modelList"></ul>
        </div>

        <!-- Chat -->
        <div class="main-chat">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <strong>مرحباً بك في منصة DarkPS!</strong><br>
                        اختر نموذجاً من القائمة الجانبية وابدأ المحادثة. جميع النماذج متاحة ومجانية.
                    </div>
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">⏳ جاري الكتابة...</div>
            <div class="input-area">
                <textarea id="userInput" placeholder="اكتب رسالتك هنا..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="btn-send" onclick="sendMessage()">🚀 إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // ============ نماذج المنصة ============
        const models = [
            // Google Gemini
            {
                id: 'gemini-3.5-flash',
                name: 'Gemini 3.5 Flash',
                provider: 'Google',
                icon: '🔵',
                color: '#4285f4',
                handler: 'geminiGoogle'
            },
            {
                id: 'gemini-deep-research',
                name: 'Gemini Deep Research',
                provider: 'Google',
                icon: '🔷',
                color: '#1a73e8',
                handler: 'geminiGoogle'
            },
            // FlexGPT (Asiacell Iraq)
            {
                id: 'flexgpt',
                name: 'FlexGPT (اسياسيل)',
                provider: 'Asiacell',
                icon: '🇮🇶',
                color: '#e91e63',
                handler: 'flexgpt'
            },
            // DeepSeek via rewind.ai
            {
                id: 'deepseek-v3',
                name: 'DeepSeek V3',
                provider: 'DeepSeek',
                icon: '🐋',
                color: '#4b32c3',
                handler: 'rewindDeepseek'
            },
            {
                id: 'deepseek-v4-pro',
                name: 'DeepSeek V4 Pro',
                provider: 'DeepSeek',
                icon: '🐋',
                color: '#6c5ce7',
                handler: 'rewindDeepseek'
            },
            {
                id: 'deepseek-r1',
                name: 'DeepSeek R1',
                provider: 'DeepSeek',
                icon: '🧠',
                color: '#00b894',
                handler: 'rewindDeepseek'
            },
            // GPT via rewind
            {
                id: 'gpt-5',
                name: 'GPT-5',
                provider: 'OpenAI',
                icon: '⚡',
                color: '#00a67d',
                handler: 'rewindChat'
            },
            {
                id: 'gpt-5.5',
                name: 'GPT-5.5',
                provider: 'OpenAI',
                icon: '⚡',
                color: '#00a67d',
                handler: 'rewindChat'
            },
            // Grok via rewind
            {
                id: 'grok-4.3',
                name: 'Grok 4.3',
                provider: 'x.AI',
                icon: '🚀',
                color: '#ff6b6b',
                handler: 'rewindChat'
            },
            // KILWA GROK
            {
                id: 'kilwa-grok',
                name: 'KILWA GROK',
                provider: 'KILWA',
                icon: '🌌',
                color: '#ff4757',
                handler: 'kilwaGrok'
            },
            // Gemini via ChatBox
            {
                id: 'gemini-2.5-flash-chatbox',
                name: 'Gemini 2.5 Flash',
                provider: 'Google',
                icon: '💎',
                color: '#0984e3',
                handler: 'chatboxGemini'
            },
            // LiveChatAI
            {
                id: 'livechatai',
                name: 'LiveChatAI',
                provider: 'LiveChat',
                icon: '💬',
                color: '#6c5ce7',
                handler: 'livechatai'
            },
            // Speech to Text
            {
                id: 'speech-to-text',
                name: 'تحويل الصوت لنص',
                provider: 'أداة',
                icon: '🎙️',
                color: '#fdcb6e',
                handler: 'speechToText'
            }
        ];

        let currentModel = null;
        let conversationHistory = [];

        // ============ تهيئة الواجهة ============
        function initUI() {
            const list = document.getElementById('modelList');
            models.forEach((model, index) => {
                const li = document.createElement('li');
                li.className = 'model-item';
                li.onclick = () => selectModel(model, li);
                li.innerHTML = `
                    <div class="model-icon" style="background:${model.color}20; color:${model.color}">${model.icon}</div>
                    <div>
                        <div style="font-weight:600">${model.name}</div>
                        <div style="font-size:0.7rem; color: var(--text-secondary)">${model.provider}</div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function selectModel(model, element) {
            document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentModel = model;
            conversationHistory = [];
            
            addMessage('assistant', `✅ تم اختيار نموذج: <strong>${model.name}</strong>\nمن مزود: ${model.provider}\n\nجاهز لاستقبال استفساراتك.`);
            
            // إغلاق السايد بار في الموبايل
            document.querySelector('.sidebar').classList.remove('open');
        }

        // ============ إضافة رسالة ============
        function addMessage(role, content) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${content}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.querySelector('.message-content');
        }

        // ============ إرسال رسالة ============
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message || !currentModel) {
                if (!currentModel) alert('الرجاء اختيار نموذج أولاً من القائمة الجانبية');
                return;
            }

            input.value = '';
            addMessage('user', message);
            
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.add('active');
            
            const btnSend = document.querySelector('.btn-send');
            btnSend.disabled = true;

            try {
                const handlerName = currentModel.handler;
                if (typeof window[handlerName] === 'function') {
                    await window[handlerName](message);
                } else {
                    addMessage('assistant', '❌ هذا النموذج غير متوفر حالياً.');
                }
            } catch (error) {
                addMessage('assistant', `❌ حدث خطأ: ${error.message}`);
            } finally {
                typingIndicator.classList.remove('active');
                btnSend.disabled = false;
            }
        }

        // ============ معالجات النماذج ============

        // Gemini Google
        async function geminiGoogle(message) {
            const response = await fetch('https://gemini.google.com/_/BardChatUi/data/assistant.lamda.BardFrontendService/StreamGenerate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8',
                    'X-Goog-Ext-525001261-Jspb': currentModel.id === 'gemini-deep-research' ? 
                        '[1,null,null,null,"cd472a54d2abba7e"]' : '[1,null,null,null,"35609594dbe934d8"]'
                },
                body: new URLSearchParams({
                    'f.req': JSON.stringify([null, JSON.stringify([[message, 0, null, [], null, null, 0], ["ar"]]])]),
                    'at': 'ABPfkH3gS_7gR8x9Z2qL1mN',
                    'bl': 'boq_assistant-bard-web-server_20240519.16_p0'
                })
            });

            const text = await response.text();
            try {
                const parsed = JSON.parse(text.split('\n')[0]);
                const content = JSON.parse(parsed[0][2]);
                addMessage('assistant', content[4][0][1][0] || 'لا يوجد رد.');
            } catch {
                addMessage('assistant', '❌ فشل في معالجة الرد من Gemini.');
            }
        }

        // FlexGPT Asiacell
        async function flexgpt(message) {
            const response = await fetch('https://api.flexgpt.live/api/chat/526', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic'
                },
                body: JSON.stringify({ message: message, isWebSearch: false })
            });
            const data = await response.json();
            addMessage('assistant', data.response || 'لا يوجد رد.');
        }

        // rewind.ai DeepSeek
        async function rewindDeepseek(message) {
            const modelMap = {
                'deepseek-v3': 'deepseek/deepseek-v3',
                'deepseek-v4-pro': 'deepseek/deepseek-v4-pro',
                'deepseek-r1': 'deepseek/deepseek-r1',
                'deepseek-v4-flash': 'deepseek/deepseek-v4-flash'
            };
            
            const modelName = modelMap[currentModel.id] || 'deepseek/deepseek-v3';
            const response = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic'
                },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: message }],
                    model: modelName,
                    stream: false
                })
            });
            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content || 'لا يوجد رد.';
            addMessage('assistant', reply);
        }

        // rewind.ai other models
        async function rewindChat(message) {
            const modelMap = {
                'gpt-5': 'openai/gpt-5',
                'gpt-5.5': 'openai/gpt-5.5',
                'grok-4.3': 'xai/grok-4.3'
            };
            
            const modelName = modelMap[currentModel.id] || 'openai/gpt-5';
            const response = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic'
                },
                body: JSON.stringify({
                    messages: [{ role: 'user', content: message }],
                    model: modelName,
                    stream: false
                })
            });
            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content || 'لا يوجد رد.';
            addMessage('assistant', reply);
        }

        // KILWA GROK
        async function kilwaGrok(message) {
            const response = await fetch(`http://de3.bot-hosting.net:21007/kilwa-grok?text=${encodeURIComponent(message)}`);
            const data = await response.json();
            addMessage('assistant', data.reply || 'لا يوجد رد.');
        }

        // Gemini via ChatBox
        async function chatboxGemini(message) {
            const response = await fetch('https://api.florate.io/v2/chats/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic'
                },
                body: JSON.stringify({
                    model: 'gemini-2.5-flash',
                    messages: [{ content: [{ type: 'text', text: message }], role: 'user' }],
                    func_scopes: [{ scope: 'web_search_v2', config: { model: 'sonar' } }]
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullResponse = '';
            const msgElement = addMessage('assistant', '');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                        try {
                            const data = JSON.parse(line.slice(6));
                            const content = data.choices?.[0]?.delta?.content || '';
                            fullResponse += content;
                            msgElement.textContent = fullResponse;
                            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                        } catch {}
                    }
                }
            }
        }

        // LiveChatAI
        async function livechatai(message) {
            // First request to get chatId
            const initResponse = await fetch('https://app.livechatai.com/api/v1/aibot/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chatbotId: 'clm2020z80001mh0f58no73h8',
                    question: message,
                    messageType: 'TEXT',
                    isFollowUp: false,
                    streaming: true,
                    country: 'PS',
                    chatType: 'MESSENGER'
                })
            });

            const initData = await initResponse.json();
            const chatId = initData.chatId;

            if (!chatId) {
                addMessage('assistant', '❌ فشل في إنشاء محادثة.');
                return;
            }

            // Follow-up
            const followResponse = await fetch('https://app.livechatai.com/api/v1/aibot/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chatbotId: 'clm2020z80001mh0f58no73h8',
                    chatId: chatId,
                    question: 'اكمل',
                    messageType: 'TEXT',
                    isFollowUp: true,
                    streaming: true,
                    country: 'PS',
                    chatType: 'MESSENGER'
                })
            });

            const reader = followResponse.body.getReader();
            const decoder = new TextDecoder();
            let fullResponse = '';
            const msgElement = addMessage('assistant', '');

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.includes('"type":"chunk"')) {
                        const token = line.match(/"token":"([^"]*)"/)?.[1] || '';
                        fullResponse += token;
                        msgElement.textContent = fullResponse;
                    }
                }
            }
        }

        // Speech to Text
