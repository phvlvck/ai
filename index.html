<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarkPS AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0f;
            color: #e2e2e2;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #13131f;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1e1e30;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #6c5ce7, #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: #13131f;
            border-left: 1px solid #1e1e30;
            overflow-y: auto;
        }

        .sidebar h3 {
            padding: 15px;
            color: #6c5ce7;
            border-bottom: 1px solid #1e1e30;
        }

        .model-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            background: none;
            border: none;
            color: #e2e2e2;
            text-align: right;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            transition: 0.3s;
        }

        .model-btn:hover { background: rgba(108,92,231,0.1); }
        .model-btn.active { background: rgba(108,92,231,0.2); border-right: 3px solid #6c5ce7; }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #13131f;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .msg {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .msg.user { justify-content: flex-end; }

        .msg-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .msg-content {
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            color: white;
        }

        .bot .msg-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid #1e1e30;
        }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            font-size: 18px;
            flex-shrink: 0;
        }

        .user .avatar { background: #6c5ce7; }

        .loading {
            display: none;
            padding: 10px 20px;
            color: #8888aa;
        }

        .loading.show { display: block; }

        .input-box {
            padding: 15px 20px;
            border-top: 1px solid #1e1e30;
            display: flex;
            gap: 10px;
        }

        .input-box input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #1e1e30;
            border-radius: 10px;
            color: #e2e2e2;
            font-size: 15px;
            outline: none;
        }

        .input-box input:focus { border-color: #6c5ce7; }

        .input-box button {
            padding: 12px 25px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .input-box button:active { transform: scale(0.95); }

        @media (max-width: 768px) {
            .sidebar { display: none; position: fixed; right: 0; top: 0; height: 100%; z-index: 100; }
            .sidebar.show { display: block; }
        }
    </style>
</head>
<body>
    <div class="header">
        <button onclick="toggleSidebar()" style="background:#6c5ce7;color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;font-size:18px;">☰</button>
        <div class="logo">⚡ DarkPS AI</div>
        <div style="font-size:12px;color:#888">@WaTaN</div>
    </div>

    <div class="main">
        <div class="sidebar" id="sidebar">
            <h3>📋 النماذج</h3>
            <div id="modelList"></div>
        </div>

        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="msg bot">
                    <div class="avatar">🤖</div>
                    <div class="msg-content">👋 مرحباً! اختر نموذجاً من القائمة وابدأ المحادثة.</div>
                </div>
            </div>
            <div class="loading" id="loading">⏳ جاري الكتابة...</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." onkeypress="if(event.key==='Enter')sendMsg()">
                <button onclick="sendMsg()">🚀 إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // ============ تعريف النماذج ============
        const models = [
            {
                id: 'flexgpt',
                name: '🇮🇶 FlexGPT - اسياسيل',
                send: async (msg) => {
                    const r = await fetch('https://api.flexgpt.live/api/chat/526', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic'
                        },
                        body: JSON.stringify({ message: msg, isWebSearch: false })
                    });
                    const d = await r.json();
                    return d.response || 'لا رد';
                }
            },
            {
                id: 'deepseek',
                name: '🐋 DeepSeek Chat',
                send: async (msg) => {
                    const r = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: 'user', content: msg }],
                            model: 'deepseek/deepseek-v3',
                            stream: false
                        })
                    });
                    const d = await r.json();
                    return d.choices?.[0]?.message?.content || 'لا رد';
                }
            },
            {
                id: 'gemini',
                name: '🔵 Google Gemini',
                send: async (msg) => {
                    const r = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: 'user', content: msg }],
                            model: 'google/gemini-2.5-flash',
                            stream: false
                        })
                    });
                    const d = await r.json();
                    return d.choices?.[0]?.message?.content || 'لا رد';
                }
            },
            {
                id: 'kilwa',
                name: '🌌 KILWA GROK',
                send: async (msg) => {
                    try {
                        const r = await fetch('http://de3.bot-hosting.net:21007/kilwa-grok?text=' + encodeURIComponent(msg));
                        const d = await r.json();
                        return d.reply || 'لا رد';
                    } catch {
                        return '⚠️ الخادم غير متاح حالياً';
                    }
                }
            },
            {
                id: 'gpt5',
                name: '⚡ GPT-5',
                send: async (msg) => {
                    const r = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            messages: [{ role: 'user', content: msg }],
                            model: 'openai/gpt-5',
                            stream: false
                        })
                    });
                    const d = await r.json();
                    return d.choices?.[0]?.message?.content || 'لا رد';
                }
            }
        ];

        let currentModel = null;

        // ============ بناء القائمة ============
        function buildList() {
            const list = document.getElementById('modelList');
            list.innerHTML = '';
            models.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = 'model-btn';
                btn.textContent = m.name;
                btn.onclick = function() {
                    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentModel = m;
                    addMsg('bot', '✅ تم اختيار: <b>' + m.name + '</b>');
                    if (window.innerWidth < 768) toggleSidebar();
                };
                list.appendChild(btn);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
        }

        // ============ إضافة رسالة ============
        function addMsg(type, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.innerHTML = `
                <div class="avatar">${type === 'user' ? '👤' : '🤖'}</div>
                <div class="msg-content">${text}</div>
            `;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        // ============ إرسال ============
        async function sendMsg() {
            const input = document.getElementById('userInput');
            const msg = input.value.trim();
            
            if (!msg) return;
            if (!currentModel) {
                alert('⚠️ الرجاء اختيار نموذج أولاً');
                return;
            }

            input.value = '';
            addMsg('user', msg);
            
            const loading = document.getElementById('loading');
            loading.classList.add('show');

            try {
                const reply = await currentModel.send(msg);
                addMsg('bot', reply);
            } catch (e) {
                addMsg('bot', '❌ خطأ في الاتصال: ' + e.message);
            }

            loading.classList.remove('show');
        }

        // ============ تشغيل ============
        buildList();

        // اختيار أول نموذج تلقائياً
        setTimeout(() => {
            const first = document.querySelector('.model-btn');
            if (first) first.click();
        }, 300);

        console.log('✅ جاهز!');
    </script>
</body>
</html>
