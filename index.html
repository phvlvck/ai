<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة DarkPS - جميع نماذج الذكاء الاصطناعي</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #13131f;
            --border: #1e1e30;
            --primary: #6c5ce7;
            --text: #e2e2e2;
            --text-secondary: #8888aa;
            --success: #00e676;
            --danger: #ff4757;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top, rgba(108,92,231,0.15), transparent 50%),
                radial-gradient(ellipse at bottom, rgba(0,206,209,0.1), transparent 50%);
        }

        .header {
            background: rgba(19,19,31,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), #00cec9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .container {
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 100px);
        }

        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            padding: 1.2rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
            font-size: 1.1rem;
        }

        .model-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
        }

        .model-item {
            padding: 0.9rem 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.9rem;
        }

        .model-item:hover { background: rgba(108,92,231,0.1); }
        .model-item.active { 
            background: rgba(108,92,231,0.2);
            border-right: 3px solid var(--primary);
        }

        .model-icon {
            width: 35px;
            height: 35px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            gap: 0.8rem;
            animation: slideIn 0.3s ease;
        }

        .message.user { justify-content: flex-end; }

        .message-content {
            max-width: 80%;
            padding: 1rem;
            border-radius: 16px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user .message-content {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant .message-content {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
        }

        .user .message-avatar { background: var(--primary); }

        .typing-indicator {
            display: none;
            color: var(--text-secondary);
            font-style: italic;
            padding: 0.5rem 1.5rem;
        }

        .typing-indicator.active { display: block; }

        .input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.8rem;
            align-items: flex-end;
        }

        .input-area textarea {
            flex: 1;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            resize: none;
            font-family: inherit;
            font-size: 0.95rem;
            min-height: 45px;
            max-height: 150px;
            line-height: 1.5;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-send {
            padding: 0.8rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 1rem;
        }

        .btn-send:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(108,92,231,0.4); }
        .btn-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .menu-toggle {
            display: none;
            background: var(--primary);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; padding: 0.5rem; height: calc(100vh - 80px); }
            .sidebar { 
                position: fixed; 
                right: -100%; 
                top: 0; 
                height: 100vh; 
                z-index: 200;
                transition: right 0.3s;
                width: 280px;
                border-radius: 0;
            }
            .sidebar.open { right: 0; }
            .menu-toggle { display: flex; align-items: center; justify-content: center; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .error-message {
            background: rgba(255,71,87,0.1);
            border: 1px solid var(--danger);
            padding: 1rem;
            border-radius: 12px;
            color: var(--danger);
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="logo">⚡ DarkPS AI</div>
        <div style="font-size:0.8rem; color: var(--text-secondary);">جميع النماذج في مكان واحد</div>
    </div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-title">📋 النماذج المتاحة</div>
            <ul class="model-list" id="modelList"></ul>
        </div>

        <div class="main-chat">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <strong>👋 مرحباً بك في منصة DarkPS!</strong><br><br>
                        📌 اختر نموذجاً من القائمة الجانبية للبدء.<br>
                        ✨ جميع النماذج متاحة ومجانية للتجربة.
                    </div>
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator">⏳ جاري الكتابة...</div>
            <div class="input-area">
                <textarea id="userInput" placeholder="اكتب رسالتك هنا... (Enter للإرسال)" rows="1"></textarea>
                <button class="btn-send" id="btnSend" onclick="sendMessage()">🚀 إرسال</button>
            </div>
        </div>
    </div>

    <script>
        // ============ تعريف النماذج ============
        const models = [
            {
                id: 'flexgpt',
                name: 'FlexGPT',
                provider: 'Asiacell العراق',
                icon: '🇮🇶',
                color: '#e91e63',
                description: 'نموذج عراقي من اسياسيل'
            },
            {
                id: 'gemini-google',
                name: 'Google Gemini',
                provider: 'Google',
                icon: '🔵',
                color: '#4285f4',
                description: 'نموذج Gemini من جوجل'
            },
            {
                id: 'deepseek-chat',
                name: 'DeepSeek Chat',
                provider: 'DeepSeek',
                icon: '🐋',
                color: '#4b32c3',
                description: 'نموذج DeepSeek المجاني'
            },
            {
                id: 'kilwa-grok',
                name: 'KILWA GROK',
                provider: 'KILWA',
                icon: '🌌',
                color: '#ff6b6b',
                description: 'نموذج Grok 4.3'
            },
            {
                id: 'livechatai',
                name: 'LiveChatAI',
                provider: 'LiveChat',
                icon: '💬',
                color: '#00b894',
                description: 'مساعد ذكي متعدد الاستخدامات'
            }
        ];

        let currentModel = null;

        // ============ تهيئة القائمة ============
        function initModelList() {
            const list = document.getElementById('modelList');
            list.innerHTML = '';
            
            models.forEach(model => {
                const li = document.createElement('li');
                li.className = 'model-item';
                li.onclick = function() { selectModel(model, this); };
                li.innerHTML = `
                    <div class="model-icon" style="background:${model.color}20; color:${model.color}">${model.icon}</div>
                    <div style="flex:1">
                        <div style="font-weight:600">${model.name}</div>
                        <div style="font-size:0.7rem; color: var(--text-secondary)">${model.provider}</div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function selectModel(model, element) {
            document.querySelectorAll('.model-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            currentModel = model;
            
            addMessage('assistant', `✅ <strong>تم اختيار: ${model.name}</strong>\n📝 ${model.description}\n\n💡 اكتب رسالتك واضغط Enter أو زر الإرسال`);
            
            // إغلاق السايد بار في الموبايل
            document.getElementById('sidebar').classList.remove('open');
        }

        // ============ إضافة رسالة ============
        function addMessage(role, content) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="message-avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${content}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div.querySelector('.message-content');
        }

        // ============ إرسال الرسالة ============
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const btnSend = document.getElementById('btnSend');
            const message = input.value.trim();
            
            if (!message) {
                input.focus();
                return;
            }
            
            if (!currentModel) {
                alert('⚠️ الرجاء اختيار نموذج أولاً من القائمة الجانبية');
                return;
            }

            // تعطيل الزر والإدخال
            input.value = '';
            input.disabled = true;
            btnSend.disabled = true;
            
            addMessage('user', message);
            
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.add('active');

            try {
                // استدعاء المعالج المناسب
                switch(currentModel.id) {
                    case 'flexgpt':
                        await handleFlexGPT(message);
                        break;
                    case 'gemini-google':
                        await handleGemini(message);
                        break;
                    case 'deepseek-chat':
                        await handleDeepSeek(message);
                        break;
                    case 'kilwa-grok':
                        await handleKilwaGrok(message);
                        break;
                    case 'livechatai':
                        await handleLiveChatAI(message);
                        break;
                    default:
                        addMessage('assistant', '❌ هذا النموذج غير مدعوم حالياً.');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', `❌ حدث خطأ: ${error.message || 'فشل الاتصال بالخادم'}`);
            } finally {
                typingIndicator.classList.remove('active');
                input.disabled = false;
                btnSend.disabled = false;
                input.focus();
            }
        }

        // ============ معالجات النماذج ============
        
        async function handleFlexGPT(message) {
            try {
                const response = await fetch('https://api.flexgpt.live/api/chat/526', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJuYW1laWQiOiIzMTk1MDUiLCJ1bmlxdWVfbmFtZSI6IlZBUyBVc2VyIiwibmJmIjoxNzg0MDc3MjkwLCJleHAiOjE3ODQ2ODIwOTAsImlhdCI6MTc4NDA3NzI5MH0.bGZnVKFIaLJh8WsxqmIX3yzOxzpYK4f0RQ8d5eumOic'
                    },
                    body: JSON.stringify({ message: message, isWebSearch: false })
                });
                
                if (!response.ok) throw new Error('خطأ في الاتصال بـ FlexGPT');
                
                const data = await response.json();
                addMessage('assistant', data.response || 'لا يوجد رد من النموذج.');
            } catch (error) {
                throw new Error('فشل الاتصال بـ FlexGPT: ' + error.message);
            }
        }

        async function handleGemini(message) {
            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyDumiLcWmAsmJxJxQxZqFqHqZqFqHqZqF', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: message }] }]
                    })
                });
                
                // Fallback: استخدام واجهة بديلة
                const fallbackResponse = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: message }],
                        model: 'google/gemini-2.5-flash',
                        stream: false
                    })
                });
                
                if (fallbackResponse.ok) {
                    const data = await fallbackResponse.json();
                    const reply = data.choices?.[0]?.message?.content || 'لا يوجد رد.';
                    addMessage('assistant', reply);
                } else {
                    throw new Error('فشل الاتصال');
                }
            } catch (error) {
                addMessage('assistant', '⚠️ نموذج Gemini غير متاح حالياً. جرب نموذجاً آخر مثل DeepSeek أو FlexGPT.');
            }
        }

        async function handleDeepSeek(message) {
            try {
                const response = await fetch('https://api.rewind.ai/v1/chat/completions/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: [{ role: 'user', content: message }],
                        model: 'deepseek/deepseek-v3',
                        stream: false
                    })
                });
                
                if (!response.ok) throw new Error('خطأ في الخادم');
                
                const data = await response.json();
                const reply = data.choices?.[0]?.message?.content || 'لا يوجد رد.';
                addMessage('assistant', reply);
            } catch (error) {
                // Fallback: تجربة DeepSeek المجاني
                try {
                    const fallbackResponse = await fetch('https://chat-deep.ai/wp-json/dsc/v1/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            messages: [
                                { role: 'system', content: 'أنت مساعد مفيد.' },
                                { role: 'user', content: message }
                            ],
                            model: 'deepseek-v3',
                            thinking: false
                        })
                    });
                    
                    if (fallbackResponse.ok) {
                        const text = await fallbackResponse.text();
                        const lines = text.split('\n');
                        let fullResponse = '';
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                                try {
                                    const json = JSON.parse(line.slice(6));
                                    const content = json.choices?.[0]?.delta?.content || '';
                                    fullResponse += content;
                                } catch {}
                            }
                        }
                        
                        addMessage('assistant', fullResponse || 'لا يوجد رد.');
                    } else {
                        throw new Error('فشل الاتصال');
                    }
                } catch {
                    addMessage('assistant', '⚠️ نموذج DeepSeek غير متاح حالياً. جرب FlexGPT أو KILWA GROK.');
                }
            }
        }

        async function handleKilwaGrok(message) {
            try {
                const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('http://de3.bot-hosting.net:21007/kilwa-grok?text=' + encodeURIComponent(message))}`);
                
                if (!response.ok) throw new Error('خطأ في الاتصال');
                
                const data = await response.json();
                addMessage('assistant', data.reply || 'لا يوجد رد.');
            } catch (error) {
                // محاولة مباشرة
                try {
                    const directResponse = await fetch(`http://de3.bot-hosting.net:21007/kilwa-grok?text=${encodeURIComponent(message)}`);
                    if (directResponse.ok) {
                        const data = await directResponse.json();
                        addMessage('assistant', data.reply || 'لا يوجد رد.');
                    } else {
                        throw new Error('فشل');
                    }
                } catch {
                    addMessage('assistant', '⚠️ KILWA GROK غير متاح حالياً. قد يكون الخادم متوقفاً.');
                }
            }
        }

        async function handleLiveChatAI(message) {
            try {
                // الخطوة 1: إنشاء محادثة
                const initResponse = await fetch('https://app.livechatai.com/api/v1/aibot/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatbotId: 'clm2020z80001mh0f58no73h8',
                        question: message,
                        messageType: 'TEXT',
                        isFollowUp: false,
                        streaming: true,
                        country: 'PS',
                        chatType: 'MESSENGER'
                    })
                });
                
                if (!initResponse.ok) throw new Error('خطأ في إنشاء المحادثة');
                
                const initData = await initResponse.json();
                const chatId = initData.chatId;
                
                if (!chatId) throw new Error('لم يتم الحصول على معرف المحادثة');
                
                // الخطوة 2: متابعة المحادثة
                const followResponse = await fetch('https://app.livechatai.com/api/v1/aibot/reply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chatbotId: 'clm2020z80001mh0f58no73h8',
                        chatId: chatId,
                        question: 'اكمل',
                        messageType: 'TEXT',
                        isFollowUp: true,
                        streaming: true,
                        country: 'PS',
                        chatType: 'MESSENGER'
                    })
                });
                
                const text = await followResponse.text();
                const lines = text.split('\n');
                let fullResponse = '';
                const msgElement = addMessage('assistant', '');
                
                for (const line of lines) {
                    if (line.includes('"type":"chunk"')) {
                        const match = line.match(/"token":"([^"]*)"/);
                        if (match && match[1]) {
                            fullResponse += match[1];
                            msgElement.innerHTML = fullResponse.replace(/\n/g, '<br>');
                            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
                        }
                    }
                }
                
                if (!fullResponse) {
                    msgElement.innerHTML = 'لا يوجد رد من المساعد.';
                }
            } catch (error) {
                addMessage('assistant', '⚠️ LiveChatAI غير متاح حالياً. جرب نموذجاً آخر.');
            }
        }

        // ============ بدء التشغيل ============
        function init() {
            initModelList();
            
            // تفعيل زر Enter للإرسال
            document.getElementById('userInput').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // اختيار أول نموذج تلقائياً
            setTimeout(() => {
                const firstModel = document.querySelector('.model-item');
                if (firstModel) firstModel.click();
            }, 500);
            
            console.log('✅ منصة DarkPS جاهزة للعمل');
            console.log('📋 عدد النماذج:', models.length);
        }

        // تشغيل المنصة
        init();
    </script>
</body>
</html>
